serverAddr = "{{ .Envs.FRP_SERVER_ADDR }}"
serverPort = 7000

[auth]
method = "token"
token = "{{ .Envs.FRP_TOKEN }}"

[webServer]
addr = "0.0.0.0"
port = 7400
user = "{{ .Envs.FRP_USER }}"
password = "{{ .Envs.FRP_PASSWORD }}"

[[proxies]]
name = "http"
type = "tcp"
localIP = "nilabiru-nginx-proxy-manager"
localPort = 80
remotePort = 80

[[proxies]]
name = "https"
type = "tcp"
localIP = "nilabiru-nginx-proxy-manager"
localPort = 443
remotePort = 443
