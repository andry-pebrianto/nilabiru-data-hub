name: Run Github Runners CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Create .env safely
        env:
          TAILSCALE_IP: ${{ secrets.TAILSCALE_IP }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBITMQ_VHOST: ${{ secrets.RABBITMQ_VHOST }}
          RUSTFS_ACCESS_KEY: ${{ secrets.RUSTFS_ACCESS_KEY }}
          RUSTFS_SECRET_KEY: ${{ secrets.RUSTFS_SECRET_KEY }}
          NEXTCLOUD_DB_NAME: ${{ secrets.NEXTCLOUD_DB_NAME }}
          NEXTCLOUD_ADMIN_USER: ${{ secrets.NEXTCLOUD_ADMIN_USER }}
          NEXTCLOUD_ADMIN_PASSWORD: ${{ secrets.NEXTCLOUD_ADMIN_PASSWORD }}
        run: |
          cat > .env << 'EOF'
          TAILSCALE_IP=$TAILSCALE_IP
          REDIS_PASSWORD=$REDIS_PASSWORD
          POSTGRES_USER=$POSTGRES_USER
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          POSTGRES_DB=$POSTGRES_DB
          MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
          MYSQL_USER=$MYSQL_USER
          MYSQL_PASSWORD=$MYSQL_PASSWORD
          MYSQL_DATABASE=$MYSQL_DATABASE
          MONGO_ROOT_USERNAME=$MONGO_ROOT_USERNAME
          MONGO_ROOT_PASSWORD=$MONGO_ROOT_PASSWORD
          RABBITMQ_USER=$RABBITMQ_USER
          RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD
          RABBITMQ_VHOST=$RABBITMQ_VHOST
          RUSTFS_ACCESS_KEY=$RUSTFS_ACCESS_KEY
          RUSTFS_SECRET_KEY=$RUSTFS_SECRET_KEY
          NEXTCLOUD_DB_NAME=$NEXTCLOUD_DB_NAME
          NEXTCLOUD_ADMIN_USER=$NEXTCLOUD_ADMIN_USER
          NEXTCLOUD_ADMIN_PASSWORD=$NEXTCLOUD_ADMIN_PASSWORD
          EOF

      - name: Ensure Init Script is Executable
        run: chmod +x init-db.sh

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Run Deploy Script
        run: docker compose up -d --remove-orphans
