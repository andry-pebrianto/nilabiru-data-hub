name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Run Deploy Script
        run: |
          cd /root/nilabiru-data-hub
          git pull origin main
          docker compose down --remove-orphans
          docker compose up --build -d
