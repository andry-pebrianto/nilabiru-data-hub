name: Run Github Runners CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Create .env
        run: |
          {
            echo "TAILSCALE_IP=${{ secrets.TAILSCALE_IP }}"
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "MONGO_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}"
            echo "MONGO_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}"
            echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}"
            echo "RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}"
            echo "RABBITMQ_VHOST=${{ secrets.RABBITMQ_VHOST }}"
            echo "SEAWEEDFS_ACCESS_KEY=${{ secrets.SEAWEEDFS_ACCESS_KEY }}"
            echo "SEAWEEDFS_SECRET_KEY=${{ secrets.SEAWEEDFS_SECRET_KEY }}"
            echo "NEXTCLOUD_DB_NAME=${{ secrets.NEXTCLOUD_DB_NAME }}"
            echo "NEXTCLOUD_ADMIN_USER=${{ secrets.NEXTCLOUD_ADMIN_USER }}"
            echo "NEXTCLOUD_ADMIN_PASSWORD=${{ secrets.NEXTCLOUD_ADMIN_PASSWORD }}"
            echo "NEXTCLOUD_TRUSTED_DOMAINS=${{ secrets.NEXTCLOUD_TRUSTED_DOMAINS }}"
            echo "FRP_SERVER_ADDR=${{ secrets.FRP_SERVER_ADDR }}"
            echo "FRP_TOKEN=${{ secrets.FRP_TOKEN }}"
            echo "FRP_USER=${{ secrets.FRP_USER }}"
            echo "FRP_PASSWORD=${{ secrets.FRP_PASSWORD }}"
          } > .env

      - name: Create SeaweedFS S3 Config
        run: |
          mkdir -p seaweedfs
          cat > seaweedfs/s3config.json <<EOF
          {
              "identities": [
                  {
                      "name": "admin",
                      "credentials": [
                          {
                              "accessKey": "${{ secrets.SEAWEEDFS_ACCESS_KEY }}",
                              "secretKey": "${{ secrets.SEAWEEDFS_SECRET_KEY }}"
                          }
                      ],
                      "actions": [
                          "Admin",
                          "Read",
                          "Write",
                          "List",
                          "Tagging"
                      ]
                  }
              ]
          }
          EOF

      - name: Ensure Init Script is Executable
        run: chmod +x init-db.sh

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Run Deploy Script
        run: docker compose up -d --remove-orphans --build

      - name: Cleanup .env and SeaweedFS Config
        if: always()
        run: rm -f .env seaweedfs/s3config.json

      - name: Cleanup unused images
        if: always()
        run: docker image prune -f
