services:
  nilabiru-nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:2.15.1"
    container_name: nilabiru-nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "${TAILSCALE_IP}:81:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - nilabiru-data-hub

  nilabiru-frpc:
    image: fatedier/frpc:v0.69.1
    container_name: nilabiru-frpc
    restart: unless-stopped
    command: ["-c", "/etc/frp/frpc.toml"]
    environment:
      - FRP_SERVER_ADDR=${FRP_SERVER_ADDR}
      - FRP_TOKEN=${FRP_TOKEN}
      - FRP_USER=${FRP_USER}
      - FRP_PASSWORD=${FRP_PASSWORD}
    ports:
      - "${TAILSCALE_IP}:7400:7400"
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    networks:
      - nilabiru-data-hub
    depends_on:
      nilabiru-nginx-proxy-manager:
        condition: service_started

  nilabiru-portainer:
    image: portainer/portainer-ce:2.42.0
    container_name: nilabiru-portainer
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:9443:9443"
      - "${TAILSCALE_IP}:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - nilabiru-data-hub

  nilabiru-redis:
    image: redis:8.8-alpine
    container_name: nilabiru-redis
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - nilabiru-data-hub
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.25"
          memory: 256M

  nilabiru-postgres:
    image: postgres:17-alpine
    container_name: nilabiru-postgres
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - NEXTCLOUD_DB_NAME=${NEXTCLOUD_DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - nilabiru-data-hub
    deploy:
      resources:
        limits:
          cpus: "2.5"
          memory: 3.5G
        reservations:
          cpus: "0.5"
          memory: 1G

  nilabiru-mongodb:
    image: mongo:8.0.11
    container_name: nilabiru-mongodb
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    command: --wiredTigerCacheSizeGB 1.5
    networks:
      - nilabiru-data-hub
    deploy:
      resources:
        limits:
          cpus: "2.5"
          memory: 3.5G
        reservations:
          cpus: "0.5"
          memory: 1G

  nilabiru-rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: nilabiru-rabbitmq
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:5672:5672"
      - "${TAILSCALE_IP}:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
    networks:
      - nilabiru-data-hub
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.25"
          memory: 512M

  nilabiru-rustfs:
    image: rustfs/rustfs:latest
    container_name: nilabiru-rustfs
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${TAILSCALE_IP}:9000:9000"
      - "${TAILSCALE_IP}:9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - /sata-storage/rustfs-data:/data
      - rustfs-logs:/app/logs
    networks:
      - nilabiru-data-hub
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nilabiru-nextcloud:
    image: nextcloud:29-apache
    container_name: nilabiru-nextcloud
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:8080:80"
    environment:
      - NC_setup_create_db_user=false
      - POSTGRES_HOST=nilabiru-postgres
      - POSTGRES_DB=${NEXTCLOUD_DB_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - REDIS_HOST=nilabiru-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - NC_overwriteprotocol=https
      - NC_overwritehost=nilabiru-nextcloud.andrypebrianto.com
      - NC_trusted_proxies=nilabiru-nginx-proxy-manager
    volumes:
      - nextcloud-data:/var/www/html
      - /sata-storage/nextcloud-files:/var/www/html/data
    networks:
      - nilabiru-data-hub
    depends_on:
      nilabiru-postgres:
        condition: service_started
      nilabiru-redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  nilabiru-gotenberg:
    image: gotenberg/gotenberg:8
    container_name: nilabiru-gotenberg
    user: gotenberg
    restart: unless-stopped
    environment:
      - CHROMIUM_DISABLE_JAVASCRIPT=false
    command:
      - "gotenberg"
      - "--api-timeout=120s"
      - "--chromium-max-queue-size=30"
      - "--chromium-auto-restart=true"
      - "--libreoffice-restart-threshold=10"
    ports:
      - "${TAILSCALE_IP}:3000:3000"
    networks:
      - nilabiru-data-hub
    deploy:
      resources:
        limits:
          cpus: "1.75"
          memory: 1.5G
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  redis-data:
  postgres-data:
  mongodb-data:
  rabbitmq-data:
  rustfs-logs:
  nextcloud-data:
  portainer-data:
  npm-data:
  npm-letsencrypt:

networks:
  nilabiru-data-hub:
    driver: bridge
