services:
  nilabiru-redis:
    image: redis:8.8-alpine
    container_name: nilabiru-redis
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - nilabiru-data-hub
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  nilabiru-postgres:
    image: postgres:17-alpine
    container_name: nilabiru-postgres
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - NEXTCLOUD_DB_NAME=${NEXTCLOUD_DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - nilabiru-data-hub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nilabiru-mysql:
    image: mysql:8.4.9
    container_name: nilabiru-mysql
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    command: --mysql-native-password=ON
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - nilabiru-data-hub
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nilabiru-mongodb:
    image: mongo:8.0.11
    container_name: nilabiru-mongodb
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    networks:
      - nilabiru-data-hub
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nilabiru-rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: nilabiru-rabbitmq
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:5672:5672"
      - "${TAILSCALE_IP}:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - nilabiru-data-hub
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  nilabiru-rustfs:
    image: rustfs/rustfs:latest
    container_name: nilabiru-rustfs
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${TAILSCALE_IP}:9000:9000"
      - "${TAILSCALE_IP}:9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - /sata-storage/rustfs-data:/data
      - rustfs-logs:/app/logs
    networks:
      - nilabiru-data-hub
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  nilabiru-nextcloud:
    image: nextcloud:29-apache
    container_name: nilabiru-nextcloud
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:8080:80"
    environment:
      - POSTGRES_HOST=nilabiru-postgres
      - POSTGRES_DB=${NEXTCLOUD_DB_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${TAILSCALE_IP}
      - REDIS_HOST=nilabiru-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - nextcloud-data:/var/www/html
      - /sata-storage/nextcloud-files:/var/www/html/data
    networks:
      - nilabiru-data-hub
    depends_on:
      nilabiru-postgres:
        condition: service_healthy
      nilabiru-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/status.php"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nilabiru-portainer:
    image: portainer/portainer-ce:2.42.0
    container_name: nilabiru-portainer
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:9443:9443"
      - "${TAILSCALE_IP}:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    networks:
      - nilabiru-data-hub

volumes:
  redis-data:
  postgres-data:
  mysql-data:
  mongodb-data:
  rabbitmq-data:
  rustfs-logs:
  nextcloud-data:
  portainer-data:

networks:
  nilabiru-data-hub:
    driver: bridge
