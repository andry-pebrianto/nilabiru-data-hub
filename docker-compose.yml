services:
  nilabiru-nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:2.15.1"
    container_name: nilabiru-nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "${TAILSCALE_IP}:81:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - nilabiru-data-hub

  nilabiru-frpc:
    image: fatedier/frpc:v0.69.1
    container_name: nilabiru-frpc
    restart: unless-stopped
    command: ["-c", "/etc/frp/frpc.toml"]
    environment:
      - FRP_SERVER_ADDR=${FRP_SERVER_ADDR}
      - FRP_TOKEN=${FRP_TOKEN}
      - FRP_USER=${FRP_USER}
      - FRP_PASSWORD=${FRP_PASSWORD}
    ports:
      - "${TAILSCALE_IP}:7400:7400"
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    networks:
      - nilabiru-data-hub
    depends_on:
      nilabiru-nginx-proxy-manager:
        condition: service_started

  nilabiru-redis:
    image: redis:8.8-alpine
    container_name: nilabiru-redis
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - nilabiru-data-hub

  nilabiru-postgres:
    image: postgres:17-alpine
    container_name: nilabiru-postgres
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - NEXTCLOUD_DB_NAME=${NEXTCLOUD_DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - nilabiru-data-hub

  nilabiru-mongodb:
    image: mongo:8.0.11
    container_name: nilabiru-mongodb
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    networks:
      - nilabiru-data-hub

  nilabiru-rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: nilabiru-rabbitmq
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:5672:5672"
      - "${TAILSCALE_IP}:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
    networks:
      - nilabiru-data-hub

  nilabiru-rustfs:
    image: rustfs/rustfs:latest
    container_name: nilabiru-rustfs
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${TAILSCALE_IP}:9000:9000"
      - "${TAILSCALE_IP}:9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY}
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - /sata-storage/rustfs-data:/data
      - rustfs-logs:/app/logs
    networks:
      - nilabiru-data-hub

  nilabiru-nextcloud:
    image: nextcloud:29-apache
    container_name: nilabiru-nextcloud
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:8080:80"
    environment:
      - NC_setup_create_db_user=false
      - POSTGRES_HOST=nilabiru-postgres
      - POSTGRES_DB=${NEXTCLOUD_DB_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - REDIS_HOST=nilabiru-redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - nextcloud-data:/var/www/html
      - /sata-storage/nextcloud-files:/var/www/html/data
    networks:
      - nilabiru-data-hub
    depends_on:
      nilabiru-postgres:
        condition: service_started
      nilabiru-redis:
        condition: service_started

  nilabiru-portainer:
    image: portainer/portainer-ce:2.42.0
    container_name: nilabiru-portainer
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:9443:9443"
      - "${TAILSCALE_IP}:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - nilabiru-data-hub

  nilabiru-ollama:
    image: ollama/ollama:0.6.8
    container_name: nilabiru-ollama
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_THREAD=12
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_INTEL_GPU=0
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - nilabiru-data-hub

  nilabiru-open-webui:
    image: ghcr.io/open-webui/open-webui:v0.5.20
    container_name: nilabiru-open-webui
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://nilabiru-ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@nilabiru-redis:6379/1
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - nilabiru-data-hub
    depends_on:
      nilabiru-ollama:
        condition: service_started
      nilabiru-redis:
        condition: service_started

  nilabiru-searxng:
    image: ghcr.io/searxng/searxng:2026.6.26-f8ffbf36f
    container_name: nilabiru-searxng
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:8888:8080"
    volumes:
      - searxng-data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://nilabiru-searxng:8080
    networks:
      - nilabiru-data-hub

volumes:
  redis-data:
  postgres-data:
  mongodb-data:
  rabbitmq-data:
  rustfs-logs:
  nextcloud-data:
  portainer-data:
  npm-data:
  npm-letsencrypt:
  ollama-data:
  open-webui-data:
  searxng-data:

networks:
  nilabiru-data-hub:
    driver: bridge
